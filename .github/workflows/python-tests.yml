name: Python Tests

on:
  push:
    paths:
      - "BrowserForensicsTool/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "BrowserForensicsTool/**"
      - ".github/workflows/python-tests.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r BrowserForensicsTool/requirements-dev.txt

      - name: Run tests
        run: python -m pytest BrowserForensicsTool/tests
